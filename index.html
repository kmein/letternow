<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Letternow - Clone</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
      background: #f4f4f5;
    }
    .editor {
      width: 40%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: white;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .editor input, .editor textarea {
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .editor textarea {
      flex-grow: 1;
      resize: none;
    }
    .preview {
      width: 60%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }
    .preview-container {
      background: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 20px;
      width: 100%;
      max-width: 800px;
      min-height: 800px;
    }
    .preview-container svg {
      width: 100%;
      height: auto;
    }
    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="editor">
    <h2>Letter Info</h2>
    <textarea id="sender" placeholder="Sender Name & Address" rows="3">John Doe
123 Main St
12345 Cityville</textarea>
    <textarea id="recipient" placeholder="Recipient Name & Address" rows="4">Jane Smith
456 Elm St
67890 Townsburg</textarea>
    <input type="text" id="date" placeholder="Date" value="22. May 2026">
    <input type="text" id="subject" placeholder="Subject" value="Important Notice">
    <div style="display: flex; gap: 10px; align-items: center;">
      <select id="fontFamily" style="padding: 8px; flex-grow: 1;">
        <option value="Roboto">Roboto (Default)</option>
      </select>
      <button id="loadLocalFontsBtn" style="padding: 8px; font-size: 12px; background: #4b5563;">Load System Fonts</button>
    </div>
    <label style="font-size: 14px; display: flex; align-items: center; gap: 5px;">
      <input type="checkbox" id="foldmarks" checked>
      Show fold & punch marks
    </label>
    <label style="font-size: 14px; display: flex; align-items: center; gap: 5px;">
      <input type="checkbox" id="pagenumbers">
      Show page numbers
    </label>
    <textarea id="body" placeholder="Letter body...">Dear Jane,

This is a test letter to demonstrate the Wasm Typst integration.

Best,
John</textarea>
    <button id="downloadBtn">Download PDF</button>
  </div>
  
  <div class="preview">
    <div class="preview-container" id="previewContainer">
      Loading preview...
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>

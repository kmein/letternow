<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Letternow - Clone</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
      background: #f4f4f5;
    }
    .editor {
      width: 40%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: white;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .editor input, .editor textarea {
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .editor textarea {
      flex-grow: 1;
      resize: none;
    }
    .preview {
      width: 60%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }
    .preview-container {
      background: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 20px;
      width: 100%;
      max-width: 800px;
      min-height: 800px;
    }
    .preview-container svg {
      width: 100%;
      height: auto;
    }
    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="editor">
    <h2>Letter Info</h2>
    <input type="text" id="sender" placeholder="Sender Name & Address" value="John Doe\n123 Main St">
    <input type="text" id="recipient" placeholder="Recipient Name & Address" value="Jane Smith\n456 Elm St">
    <input type="text" id="subject" placeholder="Subject" value="Important Notice">
    <textarea id="body" placeholder="Letter body...">Dear Jane,

This is a test letter to demonstrate the Wasm Typst integration.

Best,
John</textarea>
    <button id="downloadBtn">Download PDF</button>
  </div>
  
  <div class="preview">
    <div class="preview-container" id="previewContainer">
      Loading preview...
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
